name: CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'config/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'lunaria.config.json'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, build & link-check
    runs-on: ubuntu-latest
    env:
      GEARS_RUST_PATH: tmp/gears-rust
      BASE: /gears-rust-web-docs
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Lunaria computes per-file translation freshness from git history,
          # so the build needs the full history (not a shallow clone). The
          # /i18n dashboard is emitted during `pnpm build` below.
          fetch-depth: 0

      - name: Checkout gears-rust (docs source)
        uses: actions/checkout@v4
        with:
          repository: constructorfabric/gears-rust
          ref: main
          path: tmp/gears-rust

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync docs from gears-rust
        run: pnpm sync

      - name: Type & content check
        run: pnpm check

      - name: Markdown lint
        run: pnpm lint:md

      - name: Build
        run: pnpm build

      - name: Link check
        run: pnpm links

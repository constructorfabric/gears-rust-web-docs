name: Deploy

on:
  workflow_dispatch:
  repository_dispatch:
    types: [docs-sync]        # fired by gears-rust or cargo-gears on docs change
  push:
    branches: [main]          # infra/theme changes also redeploy
    tags: ['v*']              # release docs for version tags

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      GEARS_RUST_PATH: tmp/gears-rust
      CARGO_GEARS_PATH: tmp/cargo-gears
      GITHUB_SHA: ${{ github.event.client_payload.sha || github.sha }}
      BASE: /gears-rust-web-docs
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - uses: actions/checkout@v7
        with:
          repository: constructorfabric/gears-rust
          ref: main
          path: tmp/gears-rust

      - uses: actions/checkout@v7
        with:
          repository: constructorfabric/cargo-gears
          ref: main
          path: tmp/cargo-gears

      - run: pnpm sync
      - run: pnpm build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - uses: actions/deploy-pages@v5
        id: deploy
